<!DOCTYPE html>

<html dir="rtl" lang="fa"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Danua - Image Generation Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary": "#006a61",
                        "surface-dim": "#d8dadc",
                        "outline": "#7b7487",
                        "on-tertiary-container": "#ffdfcb",
                        "on-error": "#ffffff",
                        "surface-tint": "#732ee4",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#eaddff",
                        "on-surface-variant": "#4a4455",
                        "on-background": "#191c1e",
                        "secondary-container": "#86f2e4",
                        "on-surface": "#191c1e",
                        "primary-container": "#7c3aed",
                        "inverse-primary": "#d2bbff",
                        "surface-container": "#eceef0",
                        "primary": "#630ed4",
                        "on-tertiary-fixed": "#301400",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#ccc3d8",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-high": "#e6e8ea",
                        "tertiary": "#7c3d00",
                        "on-primary-fixed": "#25005a",
                        "secondary-fixed-dim": "#6bd8cb",
                        "inverse-surface": "#2d3133",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#00201d",
                        "tertiary-fixed-dim": "#ffb783",
                        "primary-fixed-dim": "#d2bbff",
                        "on-secondary-container": "#006f66",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#713700",
                        "surface-variant": "#e0e3e5",
                        "on-primary-container": "#ede0ff",
                        "surface-bright": "#f7f9fb",
                        "background": "#f7f9fb",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-container": "#a05100",
                        "surface": "#f7f9fb",
                        "on-primary-fixed-variant": "#5a00c6",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdcc5",
                        "secondary-fixed": "#89f5e7",
                        "on-secondary-fixed-variant": "#005049"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "4xl": "2rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "xs": "4px",
                        "sm": "12px",
                        "container-margin-desktop": "40px",
                        "lg": "32px",
                        "md": "20px",
                        "container-margin-mobile": "16px",
                        "gutter": "16px",
                        "base": "8px",
                        "xl": "48px"
                    },
                    fontFamily: {
                        "headline-md": ["Plus Jakarta Sans"],
                        "caption": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "display-lg-mobile": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "display-lg": ["40px", { "lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "40px", "fontWeight": "800" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Modal Backdrop Blur Effect */
        .glass-backdrop {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* Ambient glowing background */
        .ambient-bg {
            background: radial-gradient(circle at 50% 0%, rgba(234, 221, 255, 0.4) 0%, rgba(247, 249, 251, 1) 70%);
        }

        .gradient-button {
            background: linear-gradient(180deg, #7c3aed 0%, #630ed4 100%);
            box-shadow: 0 4px 12px rgba(99, 14, 212, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim min-h-screen flex items-center justify-center p-4 md:p-8">
<!-- Modal Container -->
<div class="glass-backdrop ambient-bg w-full max-w-sm rounded-[32px] shadow-2xl overflow-hidden relative flex flex-col h-[600px] border border-outline-variant/30">
<!-- Header -->
<div class="flex justify-between items-center p-6 pb-2 relative z-10">
<h1 class="font-headline text-headline-md text-on-surface w-full text-center">ساخت تصویر</h1>
<button aria-label="Close" class="absolute right-6 text-on-surface-variant hover:text-on-surface transition-colors w-8 h-8 flex items-center justify-center rounded-full bg-surface-container-low">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<!-- Content Canvas -->
<div class="flex-1 flex flex-col items-center px-6 pt-8 pb-6 relative z-10 overflow-y-auto">
<!-- Magic Wand Illustration Area -->
<div class="relative w-32 h-32 mb-8 flex items-center justify-center">
<!-- Soft Glow Behind -->
<div class="absolute inset-0 bg-tertiary-fixed-dim/40 rounded-full blur-xl filter scale-110"></div>
<!-- Yellow Circle Base -->
<div class="relative w-24 h-24 bg-[#FFF4D2] rounded-full flex items-center justify-center border-4 border-white shadow-[0_8px_16px_rgba(0,0,0,0.05)]">
<span class="material-symbols-outlined text-4xl text-[#FFB020]" data-icon="auto_fix_high" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
</div>
<!-- Decorative Stars (CSS only) -->
<div class="absolute top-2 right-4 w-3 h-3 bg-[#FFB020] rounded-full rotate-45 transform scale-x-50"></div>
<div class="absolute top-2 right-4 w-3 h-3 bg-[#FFB020] rounded-full rotate-45 transform scale-y-50"></div>
<div class="absolute bottom-6 left-2 w-2 h-2 bg-[#FFB020] rounded-full rotate-45 transform scale-x-50"></div>
<div class="absolute bottom-6 left-2 w-2 h-2 bg-[#FFB020] rounded-full rotate-45 transform scale-y-50"></div>
</div>
<!-- Typography -->
<div class="text-center mb-8 w-full">
<h2 class="font-headline text-[22px] font-bold text-on-surface mb-2 tracking-tight">چی می‌خوای بسازی؟</h2>
<p class="font-body-md text-on-surface-variant text-[15px]">هرچی توی ذهنت هست بنویس...</p>
</div>
<!-- Input Area -->
<div class="w-full mb-auto relative group">
<textarea class="w-full bg-surface-container-lowest border-2 border-surface-variant rounded-[20px] p-4 pt-5 min-h-[120px] resize-none font-body-md text-on-surface placeholder:text-outline/60 focus:border-primary focus:ring-0 transition-colors shadow-sm" dir="rtl" placeholder="مثلاً: یه گربه فضایی بامزه"></textarea>
<!-- Optional clear button inside textarea -->
<button class="absolute bottom-3 left-3 text-outline hover:text-primary transition-colors hidden group-focus-within:block">
<span class="material-symbols-outlined text-[20px]" data-icon="cancel">cancel</span>
</button>
</div>
</div>
<!-- Footer / Action Area -->
<div class="p-6 pt-2 bg-gradient-to-t from-surface-container-lowest via-surface-container-lowest to-transparent relative z-10">
<button class="w-full gradient-button text-on-primary font-headline text-[16px] font-bold py-4 rounded-full active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span>بساز</span>
<span class="material-symbols-outlined text-[20px]" data-icon="magic_button">magic_button</span>
</button>
</div>
</div>
</body></html>
